    <!-- Breadcrumb trail (referrer-aware, labels from each page's <h1>) -->
    <script>
    (function () {
        var nav = document.getElementById('breadcrumb');
        if (!nav || !window.sessionStorage) return;

        var STORAGE_KEY = 'vimwiki_breadcrumb_trail';
        var homeHref = nav.getAttribute('data-home') || '/';
        var homeLabel = nav.getAttribute('data-home-label') || 'Home';

        function toPath(href) {
            try { return new URL(href, window.location.href).pathname; }
            catch (e) { return href; }
        }
        function pageLabel() {
            var h1 = document.querySelector('#content h1');
            var t = h1 ? h1.textContent.replace(/\s+/g, ' ').trim() : '';
            if (t) return t;
            t = (document.title || '').replace(/_+/g, ' ').trim();
            if (t && t.toLowerCase() !== 'index') return t;
            var segs = window.location.pathname.split('/').filter(Boolean).map(function (s) {
                try { return decodeURIComponent(s); } catch (e) { return s; }
            });
            var last = segs.pop() || '';
            if (/^index\.html?$/i.test(last)) last = segs.pop() || 'index';
            return last.replace(/\.html?$/i, '').replace(/_+/g, ' ').trim() || 'Page';
        }

        var home = { path: toPath(homeHref), title: homeLabel, href: homeHref };
        var current = {
            path: window.location.pathname,
            title: pageLabel(),
            href: window.location.pathname + window.location.search
        };

        var ref = null;
        if (document.referrer) {
            try {
                var r = new URL(document.referrer);
                if (r.origin === window.location.origin) ref = r.pathname;
            } catch (e) { ref = null; }
        }

        var stored = [];
        try { stored = JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || []; }
        catch (e) { stored = []; }
        if (!Array.isArray(stored)) stored = [];

        function homeCrumb() { return { path: home.path, title: home.title, href: home.href }; }
        function idxOf(arr, p) { for (var i = 0; i < arr.length; i++) if (arr[i].path === p) return i; return -1; }

        var trail;
        if (current.path === home.path) {
            trail = [homeCrumb()];
        } else {
            var anchored = stored.length && stored[0].path === home.path;
            var base;
            if (ref) {
                var ri = idxOf(stored, ref);
                base = (ri >= 0 && anchored) ? stored.slice(0, ri + 1) : [homeCrumb()];
            } else {
                var ci = idxOf(stored, current.path);
                base = (ci >= 0 && anchored) ? stored.slice(0, ci) : [homeCrumb()];
            }
            var existing = idxOf(base, current.path);
            if (existing >= 0) {
                trail = base.slice(0, existing + 1);
                trail[existing] = { path: current.path, title: current.title, href: current.href };
            } else {
                trail = base.concat([{ path: current.path, title: current.title, href: current.href }]);
            }
            if (!trail.length || trail[0].path !== home.path) trail = [homeCrumb()].concat(trail);
        }

        try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(trail)); } catch (e) {}

        if (trail.length <= 1) return;
        trail.forEach(function (crumb, i) {
            if (i === trail.length - 1) {
                var span = document.createElement('span');
                span.className = 'breadcrumb-current';
                span.setAttribute('aria-current', 'page');
                span.textContent = crumb.title;
                nav.appendChild(span);
            } else {
                var a = document.createElement('a');
                a.href = crumb.href;
                a.textContent = crumb.title;
                nav.appendChild(a);
                var sep = document.createElement('span');
                sep.className = 'breadcrumb-sep';
                sep.textContent = '\u203A';
                nav.appendChild(sep);
            }
        });
    })();
    </script>

    <!-- Images: (1) rewrite baked-in local export paths to their web location and
         trim stray spaces, (2) upgrade http:// -> https://, (3) add a caption under
         each image using its alt text. Images with no alt are left uncaptioned.
         NOTE: the image FILES must exist on the server at the mapped location
         (e.g. /wiki/vimwiki_html/Blogs/cric/) — upload that folder. -->
    <script>
    (function () {
        var LOCAL_ANCHOR = '/vimwiki/';
        var WEB_ROOT = '/wiki/vimwiki_html/';
        document.querySelectorAll('#content img').forEach(function (img) {
            // 1) normalise the src
            var raw = img.getAttribute('src');
            if (raw) {
                var s = raw.trim();
                var i = s.indexOf(LOCAL_ANCHOR);
                if (i !== -1) s = WEB_ROOT + s.slice(i + LOCAL_ANCHOR.length);
                if (/^http:\/\//i.test(s)) s = s.replace(/^http:\/\//i, 'https://');
                if (s !== raw) img.setAttribute('src', s);
            }
            // 2) caption from alt text
            var alt = (img.getAttribute('alt') || '').trim();
            if (!alt) return;
            var parent = img.parentNode;
            if (!parent || parent.tagName === 'FIGURE') return;
            var fig = document.createElement('figure');
            fig.className = 'img-figure';
            var cap = document.createElement('figcaption');
            cap.textContent = alt;
            parent.insertBefore(fig, img);
            fig.appendChild(img);
            fig.appendChild(cap);
            // tidy a <br> left immediately after the image
            var nx = fig.nextSibling;
            if (nx && nx.nodeType === 1 && nx.tagName === 'BR') nx.parentNode.removeChild(nx);
        });
    })();
    </script>

    <!-- 1. Turn vimwiki {{{class="tikz"}}} blocks into TikZJax script tags (must run BEFORE tikzjax.js) -->
    <script>
        document.querySelectorAll('pre.tikz').forEach(function (pre) {
            var s = document.createElement('script');
            s.type = 'text/tikz';
            s.textContent = pre.textContent; // browser decodes HTML entities here
            pre.replaceWith(s);
        });
    </script>
    <!-- 2. Syntax-highlight code blocks, but skip diagram blocks -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.15.6/highlight.min.js"></script>
    <script type="text/javascript">
        document.querySelectorAll('pre:not(.mermaid):not(.tikz)').forEach(function (block) {
            hljs.highlightBlock(block);
        });
    </script>
    <!-- 3. TikZJax: renders <script type="text/tikz"> into SVG -->
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>
    <!-- 4. Mermaid: renders <pre class="mermaid"> into SVG -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true });
    </script>
