    <!-- 1. Turn vimwiki {{{class="tikz"}}} blocks into TikZJax script tags (must run BEFORE tikzjax.js) -->
    <script>
        document.querySelectorAll('pre.tikz').forEach(function (pre) {
            var s = document.createElement('script');
            s.type = 'text/tikz';
            s.textContent = pre.textContent; // browser decodes HTML entities here
            pre.replaceWith(s);
        });
    </script>

    <!-- 2. Syntax-highlight code blocks, but skip diagram blocks -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.15.6/highlight.min.js"></script>
    <script type="text/javascript">
        document.querySelectorAll('pre:not(.mermaid):not(.tikz)').forEach(function (block) {
            hljs.highlightBlock(block);
        });
    </script>

    <!-- 3. TikZJax: renders <script type="text/tikz"> into SVG -->
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

    <!-- 4. Mermaid: renders <pre class="mermaid"> into SVG -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
