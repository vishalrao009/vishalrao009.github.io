    <!-- 0. Breadcrumb trail: builds "home > link1 > link2 > current" from the pages
            visited in this browser tab, each clickable to jump straight there. -->
    <script>
    (function () {
        var nav = document.getElementById('breadcrumb');
        if (!nav || !window.sessionStorage) return;

        var STORAGE_KEY = 'vimwiki_breadcrumb_trail';
        var homeHref = nav.getAttribute('data-home') || 'index.html';
        var homeLabel = nav.getAttribute('data-home-label') || 'Home';

        // Resolve a (possibly relative) href to an absolute path for comparison.
        function toPath(href) {
            try { return new URL(href, window.location.href).pathname; }
            catch (e) { return href; }
        }

        var home = { path: toPath(homeHref), title: homeLabel, href: homeHref };
        var current = {
            path: window.location.pathname,
            title: (document.title || 'Current').trim(),
            href: window.location.pathname + window.location.search
        };

        // Load the trail saved for this tab.
        var trail = [];
        try { trail = JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || []; }
        catch (e) { trail = []; }

        // Always anchor the trail at Home.
        if (!trail.length || trail[0].path !== home.path) {
            trail = [{ path: home.path, title: home.title, href: home.href }];
        }

        if (current.path === home.path) {
            // On the home page, the trail is just Home.
            trail = [{ path: home.path, title: home.title, href: home.href }];
        } else {
            // If we've been here before in this trail, cut back to it
            // (so jumping "up" doesn't leave stale crumbs). Otherwise append.
            var idx = -1;
            for (var i = 0; i < trail.length; i++) {
                if (trail[i].path === current.path) { idx = i; break; }
            }
            if (idx >= 0) {
                trail = trail.slice(0, idx + 1);
                trail[idx].title = current.title; // refresh in case the title changed
            } else {
                trail.push(current);
            }
        }

        try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(trail)); }
        catch (e) { /* private mode / quota: still render below */ }

        // Render. Leave the bar empty (hidden via .breadcrumb:empty) if we're
        // only showing Home with nothing to navigate back to.
        if (trail.length <= 1) return;

        trail.forEach(function (crumb, i) {
            if (i === trail.length - 1) {
                var span = document.createElement('span');
                span.className = 'breadcrumb-current';
                span.setAttribute('aria-current', 'page');
                span.textContent = crumb.title;
                nav.appendChild(span);
            } else {
                var a = document.createElement('a');
                a.href = crumb.href;
                a.textContent = crumb.title;
                nav.appendChild(a);
                var sep = document.createElement('span');
                sep.className = 'breadcrumb-sep';
                sep.textContent = '\u203A'; // ›
                nav.appendChild(sep);
            }
        });
    })();
    </script>

    <!-- 1. Turn vimwiki {{{class="tikz"}}} blocks into TikZJax script tags (must run BEFORE tikzjax.js) -->
    <script>
        document.querySelectorAll('pre.tikz').forEach(function (pre) {
            var s = document.createElement('script');
            s.type = 'text/tikz';
            s.textContent = pre.textContent; // browser decodes HTML entities here
            pre.replaceWith(s);
        });
    </script>
    <!-- 2. Syntax-highlight code blocks, but skip diagram blocks -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/9.15.6/highlight.min.js"></script>
    <script type="text/javascript">
        document.querySelectorAll('pre:not(.mermaid):not(.tikz)').forEach(function (block) {
            hljs.highlightBlock(block);
        });
    </script>
    <!-- 3. TikZJax: renders <script type="text/tikz"> into SVG -->
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

        mermaid.initialize({ startOnLoad: true });
